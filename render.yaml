services:
  - type: web
    name: motovault-api
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    autoDeploy: true
    buildFilter:
      paths:
        - apps/api/**
        - packages/types/**
        - packages/tsconfig/**
        - pnpm-lock.yaml
        - turbo.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - fromGroup: motovault-secrets

envVarGroups:
  - name: motovault-secrets
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REVENUECAT_SECRET_API_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

query MaintenanceTasksByMotorcycle($motorcycleId: String!) {
  maintenanceTasks(motorcycleId: $motorcycleId) {
    id
    userId
    motorcycleId
    title
    description
    dueDate
    targetMileage
    priority
    status
    notes
    partsNeeded
    completedAt
    completedMileage
    createdAt
    updatedAt
  }
}

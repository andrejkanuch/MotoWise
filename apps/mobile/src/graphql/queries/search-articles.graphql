query SearchArticles($input: SearchArticlesInput!) {
  searchArticles(input: $input) {
    edges {
      node {
        id
        slug
        title
        difficulty
        category
        viewCount
        isSafetyCritical
        generatedAt
        updatedAt
        keywords
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

mutation CompleteMaintenanceTask($id: String!, $input: CompleteMaintenanceTaskInput, $createNextOccurrence: Boolean) {
  completeMaintenanceTask(id: $id, input: $input, createNextOccurrence: $createNextOccurrence) {
    completed {
      id
      status
      completedAt
      completedMileage
      cost
      partsCost
      laborCost
      currency
    }
    nextOccurrence {
      id
      title
      description
      dueDate
      targetMileage
      priority
      status
      isRecurring
      intervalKm
      intervalDays
      source
      motorcycleId
      createdAt
    }
  }
}

input AddTaskPhotoInput {
  fileSizeBytes: Int
  storagePath: String!
  taskId: String!
}

type Article {
  category: ArticleCategory!
  contentJson: JSON
  difficulty: ArticleDifficulty!
  generatedAt: String!
  id: ID!
  isSafetyCritical: Boolean!
  readTime: Int
  slug: String!
  title: String!
  updatedAt: String!
  viewCount: Int!
}

enum ArticleCategory {
  brakes
  drivetrain
  electrical
  engine
  fuel
  general
  suspension
  tires
}

type ArticleConnection {
  edges: [ArticleEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

enum ArticleDifficulty {
  advanced
  beginner
  intermediate
}

type ArticleEdge {
  cursor: String!
  node: Article!
}

input CompleteMaintenanceTaskInput {
  completedMileage: Int
  cost: Float
  currency: String
  laborCost: Float
  partsCost: Float
}

input CompleteOnboardingInput {
  bikeMake: String
  bikeMileage: Int
  bikeModel: String
  bikeNickname: String
  bikeType: String
  bikeYear: Int
  experienceLevel: String!
  learningFormats: [String!]!
  maintenanceStyle: String
  ridingFrequency: String
  ridingGoals: [String!]!
}

type CompleteTaskResult {
  """The task that was marked as completed"""
  completed: MaintenanceTask!

  """The next occurrence if recurring and user opted in, null otherwise"""
  nextOccurrence: MaintenanceTask
}

type ContentFlag {
  articleId: String!
  comment: String!
  createdAt: String!
  id: ID!
  sectionReference: String
  status: FlagStatus!
  userId: String!
}

input CreateDiagnosticInput {
  dataSharingOptedIn: Boolean! = false
  motorcycleId: String!
  wizardAnswers: JSON
}

input CreateFlagInput {
  articleId: String!
  comment: String!
  sectionReference: String
}

input CreateMaintenanceTaskInput {
  description: String
  dueDate: String
  motorcycleId: String!
  notes: String
  partsNeeded: [String!]
  priority: MaintenancePriority = medium
  targetMileage: Int
  title: String!
}

input CreateMotorcycleInput {
  make: String!
  model: String!
  nickname: String
  year: Int!
}

input CreateShareLinkInput {
  expiresInDays: Int = 30
  motorcycleId: String!
}

type DataExportRequest {
  completedAt: String
  createdAt: String!
  id: ID!
  requestedAt: String!
  status: String!
  userId: String!
}

type Diagnostic {
  confidence: Float
  createdAt: String!
  dataSharingOptedIn: Boolean!
  description: String
  id: ID!
  motorcycleId: String!
  relatedArticleId: String
  resultJson: JSON
  severity: DiagnosticSeverity
  status: String!
  userId: String!
}

enum DiagnosticSeverity {
  critical
  high
  low
  medium
}

enum FlagStatus {
  dismissed
  pending
  resolved
  reviewed
}

input GenerateArticleInput {
  category: ArticleCategory
  difficulty: ArticleDifficulty
  topic: String!
}

input GenerateInsightsInput {
  bikeMake: String
  bikeModel: String
  bikeType: String
  bikeYear: Int
  currentMileage: Int
  experienceLevel: String!
  maintenanceStyle: String
  ridingFrequency: String
}

enum InsightType {
  community
  learning
  maintenance
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

type LearningProgress {
  articleId: String!
  articleRead: Boolean!
  firstReadAt: String
  id: ID!
  lastReadAt: String
  quizBestScore: Int
  quizCompleted: Boolean!
  userId: String!
}

enum MaintenancePriority {
  critical
  high
  low
  medium
}

type MaintenanceTask {
  completedAt: String
  completedMileage: Int
  cost: Float
  createdAt: String!
  currency: String
  description: String
  dueDate: String
  id: ID!
  intervalDays: Int
  intervalKm: Int
  isRecurring: Boolean!
  laborCost: Float
  motorcycleId: String!
  notes: String
  oemScheduleId: String
  partsCost: Float
  partsNeeded: [String!]
  photos: [TaskPhoto!]!
  priority: MaintenancePriority!
  source: MaintenanceTaskSource!
  status: MaintenanceTaskStatus!
  targetMileage: Int
  title: String!
  updatedAt: String!
  userId: String!
}

enum MaintenanceTaskSource {
  imported
  oem
  user
}

enum MaintenanceTaskStatus {
  completed
  in_progress
  pending
  skipped
}

type Motorcycle {
  createdAt: String!
  currentMileage: Int
  id: ID!
  isPrimary: Boolean!
  make: String!
  mileageUnit: String
  mileageUpdatedAt: String
  model: String!
  nickname: String
  primaryPhotoUrl: String
  userId: String!
  year: Int!
}

type MotorcycleMake {
  isPopular: Boolean!
  makeId: Int!
  makeName: String!
}

type MotorcycleModelResult {
  modelId: Int!
  modelName: String!
}

type Mutation {
  addTaskPhoto(input: AddTaskPhotoInput!): TaskPhoto!
  completeMaintenanceTask(createNextOccurrence: Boolean, id: String!, input: CompleteMaintenanceTaskInput): CompleteTaskResult!
  completeOnboarding(input: CompleteOnboardingInput!): User!
  createDiagnostic(input: CreateDiagnosticInput!): Diagnostic!
  createFlag(input: CreateFlagInput!): ContentFlag!
  createMaintenanceTask(input: CreateMaintenanceTaskInput!): MaintenanceTask!
  createMotorcycle(input: CreateMotorcycleInput!): Motorcycle!
  createShareLink(input: CreateShareLinkInput!): ShareLink!
  deleteMaintenanceTask(id: String!): Boolean!
  deleteMotorcycle(id: String!): Boolean!
  deleteTaskPhoto(photoId: ID!): Boolean!
  generateArticle(input: GenerateArticleInput!): Article!
  generateOnboardingInsights(input: GenerateInsightsInput!): [OnboardingInsight!]!
  markArticleRead(articleId: String!): LearningProgress!
  requestDataExport: DataExportRequest!
  revokeShareLink(linkId: ID!): Boolean!
  submitDiagnostic(input: SubmitDiagnosticInput!): Diagnostic!
  submitQuiz(input: SubmitQuizInput!): QuizAttempt!
  updateMaintenanceTask(id: String!, input: UpdateMaintenanceTaskInput!): MaintenanceTask!
  updateMotorcycle(id: String!, input: UpdateMotorcycleInput!): Motorcycle!
  updateUser(input: UpdateUserInput!): User!
}

type OemSchedule {
  createdAt: String!
  description: String
  engineCcMax: Int
  engineCcMin: Int
  engineType: String
  id: ID!
  intervalDays: Int
  intervalKm: Int
  make: String!
  model: String
  priority: MaintenancePriority!
  sortOrder: Int!
  taskName: String!
  yearFrom: Int
  yearTo: Int
}

type OnboardingInsight {
  body: String!
  icon: String!
  title: String!
  type: InsightType!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Query {
  allMaintenanceTasks: [MaintenanceTask!]!
  articleBySlug(slug: String!): Article
  articleBySlugFull(slug: String!): Article
  diagnosticById(id: String!): Diagnostic
  maintenanceTaskHistory(limit: Int = 100, motorcycleId: String!): [MaintenanceTask!]!
  maintenanceTasks(motorcycleId: String!): [MaintenanceTask!]!
  me: User!
  motorcycleMakes: [MotorcycleMake!]!
  motorcycleModels(makeId: Int!, year: Int!): [MotorcycleModelResult!]!
  myDiagnostics: [Diagnostic!]!
  myMotorcycles: [Motorcycle!]!
  myProgress: [LearningProgress!]!
  myShareLinks(motorcycleId: ID!): [ShareLink!]!
  oemSchedulesForBike(motorcycleId: String!): [OemSchedule!]!
  quizByArticle(articleId: String!): Quiz
  searchArticles(input: SearchArticlesInput!): ArticleConnection!
  sharedBikeHistory(token: String!): SharedBikeHistory!
  spendingSummary(motorcycleId: String!): SpendingSummary!
  user: User!
}

type Quiz {
  articleId: String!
  generatedAt: String!
  id: ID!
  questions: [QuizQuestion!]!
}

type QuizAttempt {
  completedAt: String!
  id: ID!
  quizId: String!
  score: Float!
  totalQuestions: Float!
}

type QuizQuestion {
  explanation: String!
  options: [String!]!
  question: String!
}

input SearchArticlesInput {
  after: String
  category: ArticleCategory
  difficulty: ArticleDifficulty
  first: Int = 20
  query: String
}

type ShareLink {

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://motowise.app"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:8081",
  "motowise://auth/callback",
  "motowise://",
  "exp://192.168.0.109:8081/--/auth/callback",
  "exp://192.168.0.109:8081",
]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
[auth.mfa.web_authn]
enroll_enabled = false
verify_enabled = false

[auth.external.apple]
enabled = true
client_id = "com.motolearn.app"
secret = "env(SUPABASE_AUTH_APPLE_SECRET)"
url = ""

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
url = ""

[storage]
enabled = true
file_size_limit = "50MiB"
